name: Workflow Testing 

on:
  push

jobs:
  kind2-linux-bin:
    #if: github.repository == 'kind2-mc/kind2'
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
      with:
        driver-opts: network=host

    - name: Build and push to local registry
      uses: docker/build-push-action@v2
      with:
        file: docker/Dockerfile
        context: ./
        target: builder
        push: true
        tags: localhost:5000/name/kind2:latest
    
    - name: Extract kind 2 binary
      id: extract
      uses: shrink/actions-docker-extract@v1
      with:
        image: localhost:5000/name/kind2:latest
        path: /home/opam/kind2-build/bin/kind2

    - name: Upload kind2 binary
      uses: actions/upload-artifact@v2
      with:
        path: ${{ steps.extract.outputs.destination }}
        name: linux


  kind2-macos-bin:
    #if: github.repository == 'kind2-mc/kind2'
    strategy:
      matrix:
        ocaml-version: [ 4.12.0 ]
        os: [ macos-10.15 ]
        
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Cache opam repository
      uses: actions/cache@v2
      with:
        path: ~/.opam
        key: ${{ matrix.os }}-opam-${{ matrix.ocaml-version }}

    - name: Set up OCaml ${{ matrix.ocaml-version }}
      uses: ocaml/setup-ocaml@v2
      with:
        ocaml-compiler: ${{ matrix.ocaml-version }}

    - name: Install Kind2 OCaml dependencies
      run: opam install -y . --deps-only

    - name: Build Kind 2
      run: opam exec make static

    - name: Strip binary
      run: strip bin/kind2

    - name: Dynamic libraries
      run: otool -L bin/kind2

    - name: Upload Kind 2 binary
      uses: actions/upload-artifact@v2
      with:
        name: ${{ matrix.os }}
        path: bin/kind2

  kind2-testing:
    runs-on: macos-10.15
    needs: [kind2-macos-bin]

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Z3
      run: brew install z3

    - name: Download binary
      uses: actions/download-artifact@v2
      with:
        name: macos-10.15

    - name: Run regression tests
      run: |
        chmod u+x kind2
        ./tests/run.sh ./tests/regression ./kind2 --timeout 42
